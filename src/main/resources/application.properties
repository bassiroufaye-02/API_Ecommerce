# Configuration de l'application
spring.application.name=api_ecommerceAplication

# Configuration de la base de données
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Configuration Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Configuration JWT
jwt.secret=AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8gISIjJCUmJygpKissLS4vMDEyMzQ1Njc4OTo7PD0+Pw==
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Configuration Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
app.swagger.server-url=http://localhost:8080

# Logging
logging.level.com.ecommerce.mulboutique=DEBUG
logging.level.org.springframework.security=DEBUG

# Rate limiting
rate.limit.requests=100
rate.limit.window-seconds=60

# Stock alert threshold
stock.low-threshold=5

# File uploads
file.upload-dir=image
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
